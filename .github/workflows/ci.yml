name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  # Fast feedback: Core logic unit tests + a coverage gate. Runs on Linux; the
  # integration/e2e tests self-skip here (no bundled tools present).
  core-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test BaiJi.Core with coverage gate (>85% line)
        run: >
          dotnet test tests/BaiJi.Tests/BaiJi.Tests.csproj -c Release
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:Include="[BaiJi.Core]*"
          /p:Threshold=85
          /p:ThresholdType=line
          /p:ThresholdStat=total

  # Full verification: build the WinUI app AND run the real integration/e2e tests
  # against the fetched win-x64 binaries — the pieces that can't run on macOS.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache bundled media tools
        id: tools-cache
        uses: actions/cache@v4
        with:
          path: src/BaiJi.App/Tools
          key: tools-${{ hashFiles('scripts/fetch-binaries.ps1') }}

      - name: Fetch ffmpeg / magick / pngquant (win-x64)
        if: steps.tools-cache.outputs.cache-hit != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pwsh -File scripts/fetch-binaries.ps1

      - name: Test suite (unit + integration + e2e, real binaries)
        env:
          BAIJI_TOOLS_DIR: ${{ github.workspace }}\src\BaiJi.App\Tools
        run: >
          dotnet test tests/BaiJi.Tests/BaiJi.Tests.csproj -c Release
          --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Publish the WinUI app (win-x64, self-contained)
        # Publish (not just build) so the smoke test runs the SAME artifact type
        # Velopack ships — catches publish-only resource/layout differences.
        run: dotnet publish src/BaiJi.App/BaiJi.App.csproj -c Release -r win-x64 -p:Platform=x64 --self-contained true -o artifacts/app 2>&1 | Tee-Object build.log

      - name: Dump XAML compiler IO on failure
        if: failure()
        shell: pwsh
        run: |
          Get-ChildItem -Recurse src/BaiJi.App/obj -Include input.json,output.json -ErrorAction SilentlyContinue |
            ForEach-Object { "`n===== $($_.FullName) ====="; Get-Content $_.FullName -Raw }

      - name: List publish output (resources.pri / XBF)
        shell: pwsh
        run: |
          Get-ChildItem artifacts/app -Filter *.pri | Format-Table Name, Length
          Get-ChildItem artifacts/app -Filter *.xbf -ErrorAction SilentlyContinue | Format-Table Name, Length
          Write-Host "resources.pri present: $(Test-Path artifacts/app/resources.pri)"

      - name: Launch smoke test (app must start without crashing)
        # Catches runtime startup failures the compiler can't — e.g. a XAML
        # resource that doesn't exist in WinUI 3, or an API needing package
        # identity. Relies on the app's own CrashLog handler.
        shell: pwsh
        run: |
          $exe = Get-Item artifacts/app/BaiJi.exe -ErrorAction SilentlyContinue
          if (-not $exe) { throw "BaiJi.exe not found in publish output" }
          $log = "$env:LOCALAPPDATA\BaiJi\crash.log"
          Remove-Item $log -ErrorAction SilentlyContinue

          Write-Host "Launching $($exe.FullName)"
          $p = Start-Process -FilePath $exe.FullName -PassThru
          Start-Sleep -Seconds 10

          # Screenshot the running UI so the layout can be reviewed from CI.
          try {
            Add-Type -AssemblyName System.Windows.Forms, System.Drawing
            $b = [System.Windows.Forms.Screen]::PrimaryScreen.Bounds
            $bmp = New-Object System.Drawing.Bitmap($b.Width, $b.Height)
            $g = [System.Drawing.Graphics]::FromImage($bmp)
            $g.CopyFromScreen($b.Location, [System.Drawing.Point]::Empty, $b.Size)
            $bmp.Save("$PWD\screenshot.png")
            Write-Host "Screen: $($b.Width)x$($b.Height); saved screenshot.png"
          } catch { Write-Host "screenshot failed: $_" }

          if (Test-Path $log) {
            Write-Host "=== crash.log ==="; Get-Content $log
            if (-not $p.HasExited) { $p.Kill() }
            throw "App logged a crash on startup"
          }
          if ($p.HasExited) { throw "App exited on startup (exit code $($p.ExitCode))" }
          $p.Kill()
          Write-Host "App launched and stayed alive for 10s — OK"

      - name: Upload screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot
          path: screenshot.png

      - name: UI e2e tests (FlaUI drives the real app)
        env:
          BAIJI_APP_EXE: ${{ github.workspace }}\artifacts\app\BaiJi.exe
          BAIJI_SHOT_DIR: ${{ github.workspace }}\ui-shots
          BAIJI_SAMPLE_IMAGE: ${{ github.workspace }}\TestAssets\images\sample.jpg
        run: dotnet test tests/BaiJi.UITests/BaiJi.UITests.csproj -c Release -p:Platform=x64

      - name: Upload UI screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-shots
          path: ui-shots/**

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
